name: CI — Tests on PR

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

jobs:
  test-web:
    name: Web — typecheck + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=apps/web

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test -- --coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: web-coverage
          path: apps/web/coverage/

  test-server:
    name: Server — typecheck + unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --workspace=server

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    # Only run E2E on PRs to main — saves minutes on feature branch PRs
    if: github.base_ref == 'main'
    needs: [test-web, test-server]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/web
        env:
          # Use stub values — E2E tests hit the dev server with mocked API
          VITE_API_URL: http://localhost:3001
          VITE_SOCKET_URL: http://localhost:3001
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_stub
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
